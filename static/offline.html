<!doctype html>
<html lang="ja-JP" dir="ltr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1" />
		<title>オフライン — Quantum Game Arena</title>
		<style>
			:root {
				--theme-color: #1d2088;
				--bg-color: #ffffff;
				color-scheme: light dark;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--bg-color: #111827;
				}
			}
			body {
				margin: 0;
				background-color: var(--bg-color);
				color: var(--theme-color);
				font-family: Arial, 'Hiragino Kaku Gothic', 'Noto Sans JP', sans-serif;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100svh;
				text-align: center;
				padding: 1rem;
				box-sizing: border-box;
			}
			h1 {
				font-size: 2rem;
				margin-bottom: 0.5rem;
			}
			p {
				font-size: 1rem;
				line-height: 1.6;
				max-width: 480px;
			}
			a {
				color: var(--theme-color);
				font-weight: bold;
			}
		</style>
	</head>
	<body>
		<h1>オフラインです</h1>
		<p>
			インターネット接続が見つかりません。<br />
			接続を確認してから
			<a href="/">再試行</a>
			してください。
		</p>
	</body>
</html>
